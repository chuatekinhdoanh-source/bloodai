{% extends "base.html" %}
{% set active_page = "diabetes" %}

{% block content %}
<div class="form-title">
    <i class="fa-solid fa-microscope"></i>
    <h2>Phân Tích Nguy Cơ Tiểu Đường (XGBoost)</h2>
</div>

<form action="/predict" method="POST">
    <!-- Dùng CSS Grid mới để tự động sắp xếp các ô nhập liệu đẹp mắt -->
    <div class="form-grid">
        <div class="input-group">
            <label>Số lần mang thai</label>
            <input type="number" name="Pregnancies" value="0" placeholder="VD: 0, 1, 2..." required>
        </div>
        <div class="input-group">
            <label>Glucose (Lượng đường huyết)</label>
            <input type="number" step="0.1" name="Glucose" placeholder="VD: 90.5" required>
        </div>
        <div class="input-group">
            <label>Huyết áp tâm trương</label>
            <input type="number" step="0.1" name="BloodPressure" placeholder="VD: 70" required>
        </div>
        <div class="input-group">
            <label>Độ dày nếp da (SkinThickness)</label>
            <input type="number" step="0.1" name="SkinThickness" value="20" required>
        </div>
        <div class="input-group">
            <label>Insulin (mu U/ml)</label>
            <input type="number" step="0.1" name="Insulin" value="79" required>
        </div>
        <div class="input-group">
            <label>Chỉ số khối cơ thể (BMI)</label>
            <input type="number" step="0.1" name="BMI" placeholder="VD: 22.5" required>
        </div>
        <div class="input-group">
            <label>Tiền sử gia đình (Diab. Pedigree)</label>
            <input type="number" step="0.01" name="DiabetesPedigreeFunction" value="0.5" required>
        </div>
        <div class="input-group">
            <label>Tuổi</label>
            <input type="number" name="Age" placeholder="VD: 25" required>
        </div>
    </div>
    
    <button type="submit" class="btn-submit">
        <i class="fa-solid fa-brain"></i> Chạy Mô Hình AI
    </button>
</form>
{% endblock %}
