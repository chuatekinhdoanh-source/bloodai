{% extends "base.html" %}
{% set active_page = "liver" %}

{% block content %}
<div class="form-title">
    <i class="fa-solid fa-lungs"></i>
    <h2>Phân Tích Bệnh Gan (Random Forest)</h2>
</div>

<form action="/predict_liver" method="POST">
    <div class="form-grid">
        <div class="input-group"><label>Age (Tuổi)</label><input type="number" name="Age" value="45" required></div>
        <div class="input-group"><label>Gender (1: Nam, 0: Nữ)</label><input type="number" name="Gender" value="1" required></div>
        <div class="input-group"><label>Total_Bilirubin</label><input type="number" step="0.1" name="Total_Bilirubin" value="1.0" required></div>
        <div class="input-group"><label>Direct_Bilirubin</label><input type="number" step="0.1" name="Direct_Bilirubin" value="0.1" required></div>
        <div class="input-group"><label>Alkaline_Phosphotase</label><input type="number" step="0.1" name="Alkaline_Phosphotase" value="187" required></div>
        <div class="input-group"><label>Alamine_Aminotransferase</label><input type="number" step="0.1" name="Alamine_Aminotransferase" value="16" required></div>
        <div class="input-group"><label>Aspartate_Aminotransferase</label><input type="number" step="0.1" name="Aspartate_Aminotransferase" value="18" required></div>
        <div class="input-group"><label>Total_Protiens</label><input type="number" step="0.1" name="Total_Protiens" value="6.8" required></div>
        <div class="input-group"><label>Albumin</label><input type="number" step="0.1" name="Albumin" value="3.3" required></div>
        <div class="input-group"><label>Albumin_and_Globulin_Ratio</label><input type="number" step="0.01" name="Albumin_and_Globulin_Ratio" value="0.9" required></div>
    </div>
    
    <button type="submit" class="btn-submit">
        <i class="fa-solid fa-brain"></i> Phân Tích Dữ Liệu Gan
    </button>
</form>
{% endblock %}
