{% extends "base.html" %}
{% set active_page = "anemia" %}

{% block content %}
<div class="form-title">
    <i class="fa-solid fa-vial-virus"></i>
    <h2>Phân Tích Thiếu Máu (CatBoost)</h2>
</div>

<form action="/predict_anemia" method="POST">
    <div class="form-grid">
        <!-- CHỌN BỆNH NHÂN XÉT NGHIỆM -->
        <div class="input-group" style="grid-column: span 2; margin-bottom: 10px;">
            <label style="font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 6px;">
                <i class="fa-solid fa-hospital-user" style="font-size: 16px;"></i> Chọn Bệnh Nhân Xét Nghiệm
            </label>
            <select name="patient_id" required style="width: 100%; padding: 14px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 14.5px; outline: none; background-color: #f9fafb; font-family: inherit; color: #111827; box-sizing: border-box; transition: all 0.3s ease;">
                <option value="">-- Click để chọn bệnh nhân nhận kết quả chẩn đoán --</option>
                {% for pt in patients %}
                    <option value="{{ pt.id }}">{{ pt.fullname }} (@{{ pt.username }})</option>
                {% endfor %}
            </select>
            {% if not patients %}
            <p style="margin: 6px 0 0 0; font-size: 12.5px; color: #ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> Chưa có bệnh nhân nào đăng ký tài khoản trên hệ thống.</p>
            {% endif %}
        </div>

        <div class="input-group">
            <label>Giới tính (0: Nữ, 1: Nam)</label>
            <input type="number" step="1" name="Gender" placeholder="Nhập 0 hoặc 1" required>
        </div>
        <div class="input-group">
            <label>Huyết sắc tố (Hemoglobin)</label>
            <input type="number" step="0.1" name="Hemoglobin" required>
        </div>
        <div class="input-group">
            <label>MCH (Lượng Hb trung bình)</label>
            <input type="number" step="0.1" name="MCH" required>
        </div>
        <div class="input-group">
            <label>MCHC (Nồng độ Hb)</label>
            <input type="number" step="0.1" name="MCHC" required>
        </div>
        <div class="input-group">
            <label>MCV (Thể tích hồng cầu)</label>
            <input type="number" step="0.1" name="MCV" required>
        </div>
    </div>
    
    <button type="submit" class="btn-submit">
        <i class="fa-solid fa-brain"></i> Chạy Mô Hình AI
    </button>
</form>
{% endblock %}
