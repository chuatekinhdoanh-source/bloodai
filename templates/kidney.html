<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khoa Thận - BloodCare</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f7f6;}
        .navbar { background-color: #343a40; overflow: hidden; }
        .navbar a { float: left; display: block; color: white; text-align: center; padding: 14px 20px; text-decoration: none; font-weight: bold;}
        .navbar a:hover { background-color: #ddd; color: black; }
        .navbar a.active { background-color: #17a2b8; color: white; } /* Màu xanh dương cho Khoa Thận */
        .container { max-width: 600px; margin: 40px auto; padding: 20px; background: white; border: 1px solid #ccc; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);}
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        input { display: block; width: 100%; padding: 8px; box-sizing: border-box; margin-top: 5px; }
        button { width: 100%; padding: 12px; background-color: #17a2b8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px;}
        footer { margin-top: 50px; text-align: center; color: #666; font-size: 14px; padding-bottom: 20px;}
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/">Khoa Tiểu Đường</a>
        <a href="/anemia">Khoa Thiếu Máu</a>
        <a href="/liver">Khoa Gan</a>
        <a href="/kidney" class="active">Khoa Thận</a>
    </div>

    <div class="container">
        <h2 style="text-align: center; color: #333;">Phân Tích Bệnh Thận (LightGBM)</h2>
        <form action="/predict_kidney" method="POST">
            <div class="form-row">
                <div class="form-group"><label>Tuổi (age):</label><input type="text" name="age" value="50" required></div>
                <div class="form-group"><label>Huyết áp (bp):</label><input type="text" name="bp" value="80" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Albumin (al):</label><input type="text" name="al" value="1.0" required></div>
                <div class="form-group"><label>Đường trong nước tiểu (su):</label><input type="text" name="su" value="0.0" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Creatinine huyết thanh (sc):</label><input type="text" name="sc" value="1.2" required></div>
                <div class="form-group"><label>Hemoglobin (hemo):</label><input type="text" name="hemo" value="15.0" required></div>
            </div>
            <button type="submit">Phân tích AI Bệnh Thận</button>
        </form>
    </div>

    <footer>
        <p>Người làm: Trần Hoài An | MSSV: PK04645</p>
        <p>&copy; 2026 FPT Polytechnic. All rights reserved.</p>
    </footer>
</body>
</html>
