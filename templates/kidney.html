{% extends "base.html" %}
{% set active_page = "kidney" %}

{% block content %}
<div class="form-title">
    <i class="fa-solid fa-heart-pulse"></i>
    <h2>Phân Tích Bệnh Thận (LightGBM)</h2>
</div>

<form action="/predict_kidney" method="POST">
    <div class="form-grid">
        <!-- CHỌN BỆNH NHÂN XÉT NGHIỆM -->
        <div class="input-group" style="grid-column: span 2; margin-bottom: 10px;">
            <label style="font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 6px;">
                <i class="fa-solid fa-hospital-user" style="font-size: 16px;"></i> Chọn Bệnh Nhân Xét Nghiệm
            </label>
            <select name="patient_id" required style="width: 100%; padding: 14px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 14.5px; outline: none; background-color: #f9fafb; font-family: inherit; color: #111827; box-sizing: border-box; transition: all 0.3s ease;">
                <option value="">-- Click để chọn bệnh nhân nhận kết quả chẩn đoán --</option>
                {% for pt in patients %}
                    <option value="{{ pt.id }}">{{ pt.fullname }} (@{{ pt.username }})</option>
                {% endfor %}
            </select>
            {% if not patients %}
            <p style="margin: 6px 0 0 0; font-size: 12.5px; color: #ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> Chưa có bệnh nhân nào đăng ký tài khoản trên hệ thống.</p>
            {% endif %}
        </div>

        <!-- 24 Chỉ số chuẩn từ kidney.csv -->
        <div class="input-group"><label>age (Tuổi)</label><input type="number" step="0.1" name="age" value="48" required></div>
        <div class="input-group"><label>bp (Huyết áp)</label><input type="number" step="0.1" name="bp" value="80" required></div>
        <div class="input-group"><label>sg (Trọng lượng riêng)</label><input type="number" step="0.001" name="sg" value="1.020" required></div>
        <div class="input-group"><label>al (Albumin)</label><input type="number" step="0.1" name="al" value="1" required></div>
        <div class="input-group"><label>su (Đường)</label><input type="number" step="0.1" name="su" value="0" required></div>
        <div class="input-group"><label>rbc (Hồng cầu - 0/1)</label><input type="number" step="0.1" name="rbc" value="1" required></div>
        <div class="input-group"><label>pc (Tế bào mủ - 0/1)</label><input type="number" step="0.1" name="pc" value="1" required></div>
        <div class="input-group"><label>pcc (Cụm TB mủ - 0/1)</label><input type="number" step="0.1" name="pcc" value="0" required></div>
        <div class="input-group"><label>ba (Vi khuẩn - 0/1)</label><input type="number" step="0.1" name="ba" value="0" required></div>
        <div class="input-group"><label>bgr (Đường huyết)</label><input type="number" step="0.1" name="bgr" value="121" required></div>
        <div class="input-group"><label>bu (Ure máu)</label><input type="number" step="0.1" name="bu" value="36" required></div>
        <div class="input-group"><label>sc (Creatinine)</label><input type="number" step="0.1" name="sc" value="1.2" required></div>
        <div class="input-group"><label>sod (Natri)</label><input type="number" step="0.1" name="sod" value="135" required></div>
        <div class="input-group"><label>pot (Kali)</label><input type="number" step="0.1" name="pot" value="4.5" required></div>
        <div class="input-group"><label>hemo (Hemoglobin)</label><input type="number" step="0.1" name="hemo" value="15.4" required></div>
        <div class="input-group"><label>pcv (Thể tích HC)</label><input type="number" step="0.1" name="pcv" value="44" required></div>
        <div class="input-group"><label>wc (Bạch cầu)</label><input type="number" step="0.1" name="wc" value="7800" required></div>
        <div class="input-group"><label>rc (Lượng HC)</label><input type="number" step="0.1" name="rc" value="5.2" required></div>
        <div class="input-group"><label>htn (Tăng HA - 0/1)</label><input type="number" step="0.1" name="htn" value="1" required></div>
        <div class="input-group"><label>dm (Tiểu đường - 0/1)</label><input type="number" step="0.1" name="dm" value="1" required></div>
        <div class="input-group"><label>cad (Mạch vành - 0/1)</label><input type="number" step="0.1" name="cad" value="0" required></div>
        <div class="input-group"><label>appet (Thèm ăn - 0/1)</label><input type="number" step="0.1" name="appet" value="1" required></div>
        <div class="input-group"><label>pe (Phù nề - 0/1)</label><input type="number" step="0.1" name="pe" value="0" required></div>
        <div class="input-group"><label>ane (Thiếu máu - 0/1)</label><input type="number" step="0.1" name="ane" value="0" required></div>
    </div>
    
    <button type="submit" class="btn-submit">
        <i class="fa-solid fa-brain"></i> Phân Tích Dữ Liệu Thận
    </button>
</form>
{% endblock %}
